# systemd drop-in for turtlebot4.service — swap vendor rplidar.launch.py for
# turtlebot4_lds02_bringup turtlebot4_bringup.launch.py (LDS-02 LiDAR).
#
# Install path on TurtleBot4:
#   /etc/systemd/system/turtlebot4.service.d/override.conf
#
# Install commands (run on TurtleBot4 RPi4):
#   sudo install -d /etc/systemd/system/turtlebot4.service.d
#   sudo install -m 0644 \
#     ~/Turtlebot4_lds02_bringup_ws/src/turtlebot4_lds02_bringup/systemd/override.conf \
#     /etc/systemd/system/turtlebot4.service.d/override.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart turtlebot4.service
#
# NOTE: Install path is FIXED to ~ubuntu/Turtlebot4_lds02_bringup_ws on the
#       TurtleBot4 RPi4. Any other path is unsupported — clone into that exact
#       location (see README "빠른 설치"). Multi-deploy / multi-user scenarios
#       are out of scope for this single-purpose shim.
#
# Vendor immutability: the unit file at /lib/systemd/system/turtlebot4.service
# is NOT modified. systemd merges this drop-in on top.
#
# Replaces the vendor ExecStart (which runs /usr/sbin/turtlebot4-start →
# robot_upstart mklaunch over /etc/ros/humble/turtlebot4.d/, which symlinks
# to vendor standard.launch.py and pulls in rplidar.launch.py).
#
# Preserves:
#   - /etc/turtlebot4/setup.bash (ROBOT_NAMESPACE, FastDDS profile, RMW, etc.)
#   - /opt/ros/humble (vendor ROS install)
#   - setpriv --reuid ubuntu (drops to unprivileged user, same as vendor)
# Adds:
#   - Sources our colcon overlay so the new launch package resolves.

[Service]
ExecStart=
# setpriv preserves env but does not reset HOME for the reuid'd user, so rcutils
# cannot expand ~/.ros for the log dir. Match vendor turtlebot4-start by setting
# ROS_HOME/ROS_LOG_DIR explicitly. Logs persist at /home/ubuntu/.ros/log/<timestamp>/
# (running on a per-batch reflash workflow so disk accumulation is not a concern).
ExecStart=/bin/bash -c 'source /etc/turtlebot4/setup.bash && source /home/ubuntu/Turtlebot4_lds02_bringup_ws/install/setup.bash && export HOME=/home/ubuntu && export ROS_HOME=/home/ubuntu/.ros && export ROS_LOG_DIR=/home/ubuntu/.ros/log && exec setpriv --reuid ubuntu ros2 launch turtlebot4_lds02_bringup turtlebot4_bringup.launch.py'
